name: Build

on:
  workflow_dispatch:

jobs:
  build:
    name: Build
    runs-on: ubuntu-slim
    steps:
      - uses: actions/checkout@v6

      - uses: pnpm/setup@v1
        with:
          runtime: node@26
          cache: true

      - run: pnpm run build

      - uses: actions/upload-artifact@v7
        with:
          name: SmartTavern
          path: .output/**/*
          compression-level: 9
